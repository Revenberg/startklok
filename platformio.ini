[env:esp32dev]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7

build_src_filter =
    +<*>
    -<tft_touch_test.cpp>

lib_deps = 
    links2004/WebSockets@^2.7.2
    bblanchon/ArduinoJson@^7.4.3
    adafruit/RTClib@^2.1.4
    witnessmenow/UniversalTelegramBot@^1.3.0

build_flags = 
    -DCORE_DEBUG_LEVEL=0

; Flash settings
board_build.filesystem = littlefs
board_build.flash_mode = dio
board_build.partitions = default.csv

[env:tft_touch_test]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7

; Only compile the TFT test file for this environment.
build_src_filter =
    +<tft_touch_test.cpp>

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    paulstoffregen/XPT2046_Touchscreen

build_flags =
    -DCORE_DEBUG_LEVEL=0
