[env:esp32dev]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7

build_src_filter =
    +<*>
    -<tft_touch_test.cpp>
    -<tft_adafruit_test.cpp>
    -<tft_pin_scan.cpp>

lib_deps = 
    links2004/WebSockets@^2.7.2
    bblanchon/ArduinoJson@^7.4.3
    adafruit/RTClib@^2.1.4
    witnessmenow/UniversalTelegramBot@^1.3.0
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit GFX Library@^1.11.11
    paulstoffregen/XPT2046_Touchscreen

build_flags = 
    -DCORE_DEBUG_LEVEL=0

; Flash settings
board_build.filesystem = littlefs
board_build.flash_mode = dio
board_build.partitions = default.csv

[env:tft_touch_test]
platform = espressif32@5.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7

; Only compile the TFT test file for this environment.
build_src_filter =
    +<tft_touch_test.cpp>

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    paulstoffregen/XPT2046_Touchscreen

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTOUCH_CS=5
    -DSPI_FREQUENCY=27000000

